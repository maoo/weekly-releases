name: FINOS releases CI

on:
  push:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint (ruff + black)
        run: uv run ruff check weekly_releases tests && uv run black --check weekly_releases tests
      - name: Test
        run: uv run pytest

  weekly-scan:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run weekly scan
        run: uv run weekly-releases
      - name: Commit updates
        run: |
          # git diff --quiet ignores untracked files; weekly HTML lives under docs/YYYY/
          # which may be newly created on the runner. Stage first, then compare index to HEAD.
          git add .
          if git diff --cached --quiet; then
            echo "No release changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update weekly FINOS releases"
          git push
